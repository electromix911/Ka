<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9ec4,#ffd6e8,#ffeef5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.contenedor{
    text-align:center;
    background:rgba(255,255,255,.85);
    padding:30px;
    border-radius:25px;
    box-shadow:0 0 20px rgba(0,0,0,.2);
    max-width:350px;
}

h1{
    color:#ff3d7f;
    font-size:28px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#ff4f8b;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

img{
    display:none;
    width:250px;
    margin-top:20px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.3);
}

.corazon{
    position:fixed;
    color:#ff4f8b;
    font-size:22px;
    animation:subir 5s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="contenedor">
    <h1>🌙 Que tengas una linda noche, cachetona. ❤️</h1>

    <button onclick="mostrar()">Presióname 💖</button>

    <img id="foto" src="foto.jpg" alt="Foto">
</div>

<script>
function mostrar(){
    document.getElementById("foto").style.display="block";

    for(let i=0;i<40;i++){
        let c=document.createElement("div");
        c.className="corazon";
        c.innerHTML="❤️";
        c.style.left=Math.random()*100+"vw";
        c.style.animationDuration=(3+Math.random()*3)+"s";
        c.style.fontSize=(15+Math.random()*25)+"px";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),6000);
    }
}
</script>

</body>
</html>
